platforms:
  slack:
    enabled: true
    bot_token: ${SLACK_BOT_TOKEN}
    app_token: ${SLACK_APP_TOKEN}
    monitor_channels: []   # empty = all channels bot is in
    digest_channel: "ioc-check"
  discord:
    enabled: false
    bot_token: ${DISCORD_BOT_TOKEN}
    monitor_channels: []   # empty = all channels bot can read
    digest_channel: null   # channel ID (integer)

intel:
  max_iocs_per_message: 5
  cache_ttl: 3600
  timeout: 10
  providers:
    virustotal:
      enabled: true
      api_key: ${VT_API_KEY}
    shodan:
      enabled: true
      api_key: ${SHODAN_API_KEY}
    greynoise:
      enabled: true
      api_key: ${GREYNOISE_API_KEY}
    abuseipdb:
      enabled: true
      api_key: ${ABUSEIPDB_API_KEY}
    otx:
      enabled: true
      api_key: ${OTX_API_KEY}
    urlhaus:
      enabled: true
      api_key: ${ABUSECH_API_KEY}
    threatfox:
      enabled: true
      api_key: ${ABUSECH_API_KEY}
    malwarebazaar:
      enabled: true
    ipinfo:
      enabled: true
      api_key: ${IPINFO_API_KEY}
    circl_cve:
      enabled: true
    urlscan:
      enabled: true
      # api_key: ${URLSCAN_API_KEY}   # optional — lifts rate limits
    crtsh:
      enabled: true
    whois_age:
      enabled: true
      # api_key: ${WHOISXML_API_KEY}  # optional — uses free RDAP without key
    circl_pdns:
      enabled: true
      api_key: ${CIRCL_PDNS_KEY}      # "user:password" — free account at circl.lu/services/passive-dns/
    hibp:
      enabled: true
      api_key: ${HIBP_API_KEY}        # required — https://haveibeenpwned.com/API/Key
    bgpview:
      enabled: true                   # free, no key required — https://bgpview.io/

digest:
  # Fallback schedule for topics that don't define their own (5-part cron)
  default_schedule: "0 6 * * *"
  timezone: "Australia/Brisbane"
  max_chars_per_source: 3000
  max_total_chars_per_topic: 20000   # cap total content sent to LLM per topic (~5k tokens)
  data_dir: "data"                   # persistent storage for history, trend detection, source health

  # LLM backend: "ollama" (local, free) or "anthropic" (paid)
  llm_provider: "${LLM_PROVIDER:-ollama}"

  # Ollama — local LLM, no API cost. Runs on your own hardware.
  # See: https://ollama.com/  |  Recommended models: llama3.2, phi3:mini, mistral
  # Use http://ollama:11434 when running via docker-compose --profile ollama
  # Use http://localhost:11434 when running Ollama separately
  ollama_base_url: "${OLLAMA_BASE_URL:-http://localhost:11434}"
  ollama_model: "${OLLAMA_MODEL:-gemma2:2b}"

  # Anthropic Claude — paid API. Only used when llm_provider = "anthropic"
  anthropic_model: "claude-haiku-4-5-20251001"
  anthropic_api_key: "${ANTHROPIC_API_KEY}"

# ── Whisper podcast transcription (optional) ──────────────────────────────
# When enabled, podcast RSS enclosures (audio/*) are downloaded and transcribed
# before being passed to the LLM for summarisation.
# Requires the whisper service in docker-compose.yml.
whisper:
  enabled: true
  base_url: "http://whisper:8000"
  # max_audio_mb and transcription_timeout are enforced in fetcher.py constants
