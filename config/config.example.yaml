platforms:
  slack:
    enabled: true
    bot_token: ${SLACK_BOT_TOKEN}
    app_token: ${SLACK_APP_TOKEN}
    monitor_channels: []   # empty = all channels bot is in
    digest_channel: "#daily-digest"
  discord:
    enabled: false
    bot_token: ${DISCORD_BOT_TOKEN}
    monitor_channels: []   # empty = all channels bot can read
    digest_channel: null   # channel ID (integer)

intel:
  max_iocs_per_message: 5
  cache_ttl: 3600
  timeout: 10
  providers:
    virustotal:
      enabled: true
      api_key: ${VT_API_KEY}
    shodan:
      enabled: true
      api_key: ${SHODAN_API_KEY}
    greynoise:
      enabled: true
      api_key: ${GREYNOISE_API_KEY}
    abuseipdb:
      enabled: true
      api_key: ${ABUSEIPDB_API_KEY}
    otx:
      enabled: true
      api_key: ${OTX_API_KEY}
    urlhaus:
      enabled: true
    threatfox:
      enabled: true
    malwarebazaar:
      enabled: true
    ipinfo:
      enabled: true
      api_key: ${IPINFO_API_KEY}
    circl_cve:
      enabled: true

digest:
  # Fallback schedule for topics that don't define their own (5-part cron)
  default_schedule: "0 6 * * *"
  timezone: "UTC"
  max_chars_per_source: 3000
  llm_model: "claude-haiku-4-5-20251001"
  llm_api_key: ${ANTHROPIC_API_KEY}
